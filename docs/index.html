<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>MadDev — Documentação</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentação do MadDev — roguelike dungeon crawler em Godot 4.6. Projeto da disciplina Arquitetura e Desenho de Software (UnB).">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #7c5cff;
      --theme-color-dark: #5b3fd6;
    }
    .sidebar-nav > ul > li > strong,
    .sidebar-nav > ul > li > p {
      color: var(--theme-color-dark);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .app-name-link { font-weight: 700; }
    .cover-main .anchor span { color: var(--theme-color-dark); }
    .markdown-section table { display: table; width: 100%; }
  </style>
</head>
<body>
  <div id="app">Carregando documentação do MadDev…</div>
  <script>
    // Escapa entidades HTML para que diagramas com '<', '>' e '&'
    // (ex.: relações '<|--' em class diagrams) cheguem intactos ao Mermaid.
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    window.$docsify = {
      name: 'MadDev',
      repo: 'https://github.com/UnBArqDsw2026-1-Turma02/2026.1-T02_G1_MadDev_Entrega_04',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      onlyCover: false,
      auto2top: true,
      subMaxLevel: 2,
      maxLevel: 4,
      search: {
        placeholder: 'Pesquisar na documentação…',
        noData: 'Nenhum resultado encontrado.',
        depth: 4
      },
      markdown: {
        renderer: {
          // Blocos ```mermaid viram <div class="mermaid"> renderizado pelo Mermaid;
          // demais blocos de código seguem o realce padrão do docsify.
          code: function (code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + escapeHtml(code) + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      plugins: [
        function (hook) {
          // Após cada página renderizar, processa os diagramas ainda não desenhados.
          hook.doneEach(function () {
            if (window.mermaid) {
              window.mermaid.run({ querySelector: '.mermaid' });
            }
          });
        }
      ]
    };
  </script>
  <!-- Mermaid (v11, ESM) -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false });
    window.mermaid = mermaid;
    try { mermaid.run({ querySelector: '.mermaid' }); } catch (e) {}
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@3"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
